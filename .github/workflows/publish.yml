name: Publish

on:
  push:
    tags:
      - '*'

# We need this to be able to create releases.
permissions:
  contents: write

jobs:
  # NOTE: Linux build is DISABLED because wakem currently only supports Windows and macOS.
  # Linux support is planned for future migration (see AGENTS.md).
  # To re-enable: add Linux platform support in src/platform/linux/ and remove 'if: false'
  linux-gnu:
    name: Linux Build (Disabled)
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Show GLIBC
        run: ldd --version
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --verbose --release
      - name: Create tarball
        run: tar cvfz wakem.tar.gz target/release/wakem
      - name: Upload binaries to releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: wakem.tar.gz
          asset_name: wakem-x86_64-unknown-linux-gnu.tar.gz
          tag: ${{ github.ref }}

  macos:
    name: macOS Build
    if: false
    runs-on: macOS-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: 10.12
        run: cargo build --verbose --release
      - name: Create tarball
        run: tar cvfz wakem.tar.gz target/release/wakem
      - name: Upload binaries to releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: wakem.tar.gz
          asset_name: wakem-x86_64-apple-darwin.tar.gz
          tag: ${{ github.ref }}

  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Enable static CRT linkage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .cargo | Out-Null
          Set-Content -Path .cargo/config.toml -Value "[target.x86_64-pc-windows-msvc]` -Encoding UTF8
          Add-Content -Path .cargo/config.toml -Value "rustflags = ['-Ctarget-feature=+crt-static']" -Encoding UTF8
      - name: Build
        run: cargo build --verbose --release
      - name: Create zip
        shell: pwsh
        run: Compress-Archive -DestinationPath ./wakem.zip -Path ./target/release/wakem.exe
      - name: Upload binaries to releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: wakem.zip
          asset_name: wakem-x86_64-pc-windows-msvc.zip
          tag: ${{ github.ref }}
