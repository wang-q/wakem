# Code Coverage
#
# NOTE: This workflow is currently DISABLED because:
# - cargo tarpaulin requires Linux (uses ptrace system calls)
# - wakem project currently only supports Windows and macOS
# - Linux support is planned for future migration
#
# To re-enable this workflow:
# 1. Add Linux platform support to src/platform/linux/
# 2. Remove the `if: false` condition below
# 3. Ensure all platform-specific types (OutputDevice, Launcher, etc.) have Linux implementations

name: Code Coverage

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: codecov
    # Temporarily disabled - see note above
    if: false
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate code coverage
        run: |
          cargo +nightly tarpaulin --lib --bins --tests --follow-exec --engine llvm --out xml -- --test-threads 1

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
