# wakem test configuration file
# Copy this file to %USERPROFILE%\.wakem.toml for testing

# Log level: trace, debug, info, warn, error
log_level = "debug"

# Show system tray icon
tray_icon = true

# Auto-reload configuration (reserved)
auto_reload = true

[keyboard]
# Basic remapping
[keyboard.remap]
CapsLock = "Backspace"      # CapsLock -> Backspace
RightAlt = "Ctrl"           # Right Alt -> Ctrl

# Navigation layer (similar to mrw's hyper key concept)
# HJKL becomes arrow keys while holding CapsLock
[keyboard.layers.navigation]
activation_key = "CapsLock"
mode = "Hold"  # Hold: activate while held, Toggle: toggle mode

[keyboard.layers.navigation.mappings]
H = "Left"      # H -> Left arrow
J = "Down"      # J -> Down arrow
K = "Up"        # K -> Up arrow
L = "Right"     # L -> Right arrow
U = "Home"      # U -> Home
O = "End"       # O -> End
Y = "PageUp"    # Y -> PageUp
N = "PageDown"  # N -> PageDown

# Window management shortcuts
[window.shortcuts]
# Center window
"Ctrl+Alt+C" = "Center"

# Move to screen edges
"Ctrl+Alt+Home" = "MoveToEdge(Left)"
"Ctrl+Alt+End" = "MoveToEdge(Right)"
"Ctrl+Alt+PageUp" = "MoveToEdge(Top)"
"Ctrl+Alt+PageDown" = "MoveToEdge(Bottom)"

# Half screen display
"Ctrl+Alt+Shift+Left" = "HalfScreen(Left)"
"Ctrl+Alt+Shift+Right" = "HalfScreen(Right)"
"Ctrl+Alt+Shift+Up" = "HalfScreen(Top)"
"Ctrl+Alt+Shift+Down" = "HalfScreen(Bottom)"

# Loop adjust width (3/4 -> 3/5 -> 1/2 -> 2/5 -> 1/4)
"Ctrl+Alt+Left" = "LoopWidth(Left)"
"Ctrl+Alt+Right" = "LoopWidth(Right)"

# Loop adjust height (3/4 -> 1/2 -> 1/4)
"Ctrl+Alt+Up" = "LoopHeight(Top)"
"Ctrl+Alt+Down" = "LoopHeight(Bottom)"

# Fixed ratio window (4:3, loop zoom: 100% -> 90% -> 70% -> 50%)
"Ctrl+Alt+M" = "FixedRatio(1.333, 0)"

# Switch to next window of same process (Alt+`)
"Alt+Grave" = "SwitchToNextWindow"

# Move across monitors
"Ctrl+Alt+J" = "MoveToMonitor(Next)"
"Ctrl+Alt+K" = "MoveToMonitor(Prev)"

# Window minimize/maximize/close
"Ctrl+Alt+N" = "Minimize"
"Ctrl+Alt+X" = "Maximize"
"Ctrl+Alt+Q" = "Close"

[mouse]
# Mouse settings (reserved)
# Wheel speed adjustment
# wheel_speed = 1.0

[launch]
# Quick launch programs
# Format 1: Simple command (backward compatible)
# "Ctrl+Alt+T" = "wt.exe"  # Windows Terminal

# Format 2: Command with arguments (using parse_command)
# "Ctrl+Alt+N" = "notepad.exe C:\\Users\\note.txt"
# "Ctrl+Alt+G" = "git.exe status"
# "Ctrl+Alt+E" = "explorer.exe D:\\"  # Open D: drive
