# wakem window management dedicated configuration
# Inspired by mrw project's window management features
# Hyper key = Ctrl + Alt + Meta (cross-platform, works on Windows/macOS/Linux)

# Custom tray icon path (optional)
# If not specified, will auto-detect assets/icon.ico in program directory
# icon_path = "assets/icon.ico"

[keyboard]
# Map CapsLock to Hyper key (Ctrl+Alt+Meta) for convenient window management
# This allows centering windows with just CapsLock + C instead of three modifiers
[keyboard.remap]
CapsLock = "Ctrl+Alt+Meta"

# Window management shortcuts (Hyper key style: Ctrl + Alt + Meta)
[window.shortcuts]
# ========== Window Centering ==========
# Multiple keys mapped to same function (referencing mrw)
"Ctrl+Alt+Meta+C" = "Center"
"Ctrl+Alt+Meta+Shift+C" = "Center"
"Ctrl+Alt+Meta+Delete" = "Center"
"Ctrl+Alt+Meta+Shift+Delete" = "Center"
"Ctrl+Alt+Meta+ForwardDelete" = "Center"
"Ctrl+Alt+Meta+Shift+ForwardDelete" = "Center"

# ========== Move to Edges ==========
"Ctrl+Alt+Meta+Home" = "MoveToEdge(Left)"
"Ctrl+Alt+Meta+Shift+Home" = "MoveToEdge(Left)"
"Ctrl+Alt+Meta+End" = "MoveToEdge(Right)"
"Ctrl+Alt+Meta+Shift+End" = "MoveToEdge(Right)"
"Ctrl+Alt+Meta+PageUp" = "MoveToEdge(Top)"
"Ctrl+Alt+Meta+Shift+PageUp" = "MoveToEdge(Top)"
"Ctrl+Alt+Meta+PageDown" = "MoveToEdge(Bottom)"
"Ctrl+Alt+Meta+Shift+PageDown" = "MoveToEdge(Bottom)"

# ========== Half Screen Display ==========
"Ctrl+Alt+Meta+Shift+Left" = "HalfScreen(Left)"
"Ctrl+Alt+Meta+Shift+Right" = "HalfScreen(Right)"
"Ctrl+Alt+Meta+Shift+Up" = "HalfScreen(Top)"
"Ctrl+Alt+Meta+Shift+Down" = "HalfScreen(Bottom)"

# ========== Loop Resize ==========
# Width loop: 3/4 -> 3/5 -> 1/2 -> 2/5 -> 1/4
"Ctrl+Alt+Meta+Left" = "LoopWidth(Left)"
"Ctrl+Alt+Meta+Right" = "LoopWidth(Right)"
# Height loop: 3/4 -> 1/2 -> 1/4
"Ctrl+Alt+Meta+Up" = "LoopHeight(Top)"
"Ctrl+Alt+Meta+Down" = "LoopHeight(Bottom)"

# ========== Fixed Ratio Window ==========
# 4:3 ratio, loop zoom: 100% -> 90% -> 70% -> 50%
"Ctrl+Alt+Meta+M" = "FixedRatio(1.333, 0)"
# Native ratio (based on screen ratio)
"Ctrl+Alt+Meta+Shift+M" = "NativeRatio(0)"
"Ctrl+Alt+Meta+Enter" = "FixedRatio(1.333, 0)"
"Ctrl+Alt+Meta+Shift+Enter" = "NativeRatio(0)"

# ========== Same Process Window Switching ==========
"Alt+Grave" = "SwitchToNextWindow"

# ========== Move Across Monitors ==========
"Ctrl+Alt+Meta+J" = "MoveToMonitor(Next)"
"Ctrl+Alt+Meta+K" = "MoveToMonitor(Prev)"

# ========== Debug Functions ==========
# Hyper+W: Show current window debug info (similar to mrw's MsgBox(GetDebugInfo()))
"Ctrl+Alt+Meta+W" = "ShowDebugInfo"
# Hyper+Shift+W: Show test notification (similar to mrw's TrayTip)
"Ctrl+Alt+Meta+Shift+W" = "ShowNotification(wakem, Hello World!)"

# ========== Quick Launch Programs ==========
# Supports command line launch with arguments
[launch]
# Launch Windows Terminal
"Ctrl+Alt+Meta+T" = "wt.exe"
# Launch Notepad and open specific file
"Ctrl+Alt+Meta+N" = "notepad.exe"
# Open File Explorer to D: drive
"Ctrl+Alt+Meta+E" = "explorer.exe D:\\"
# Launch Calculator
"Ctrl+Alt+Meta+Equals" = "calc.exe"
