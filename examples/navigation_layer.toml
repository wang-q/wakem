# wakem 导航层配置示例
# Vim 风格的导航层

[keyboard]
# 基础重映射
remap = [
    { from = "CapsLock", to = "Backspace" },
]

# Vim 风格的导航层
# 按住 CapsLock 时，使用 HJKL 进行方向导航
[[keyboard.layers]]
name = "vim_navigation"
activation_key = "CapsLock"
mode = "Hold"
mappings = [
    # 基本方向
    { from = "H", to = "Left" },
    { from = "J", to = "Down" },
    { from = "K", to = "Up" },
    { from = "L", to = "Right" },
    
    # 快速移动
    { from = "W", to = "Ctrl+Right" },      # 下一个单词
    { from = "B", to = "Ctrl+Left" },       # 上一个单词
    { from = "0", to = "Home" },            # 行首
    { from = "4", to = "End" },             # 行尾（Shift+4 是 $）
    { from = "G", to = "Ctrl+End" },        # 文档末尾
    { from = "U", to = "PageUp" },
    { from = "D", to = "PageDown" },
    
    # 文本编辑
    { from = "X", to = "Delete" },          # 删除字符
    { from = "I", to = "Home" },            # 行首插入
    { from = "A", to = "End" },             # 行尾追加
    { from = "O", to = "Ctrl+Enter" },      # 下方插入新行
    
    # 选择（配合 Shift）
    { from = "V", to = "Shift+Down" },      # 开始选择
]

# 另一个层：数字层（使用 RightAlt 激活）
[[keyboard.layers]]
name = "numpad"
activation_key = "RightAlt"
mode = "Hold"
mappings = [
    # 将 UIO/JKL/M,. 映射为数字键盘
    { from = "U", to = "Numpad7" },
    { from = "I", to = "Numpad8" },
    { from = "O", to = "Numpad9" },
    { from = "J", to = "Numpad4" },
    { from = "K", to = "Numpad5" },
    { from = "L", to = "Numpad6" },
    { from = "M", to = "Numpad1" },
    { from = "Comma", to = "Numpad2" },
    { from = "Period", to = "Numpad3" },
]
