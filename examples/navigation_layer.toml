# wakem navigation layer configuration example
# Vim-style navigation layer

[keyboard]

# Vim-style navigation layer
# Use HJKL for directional navigation while holding CapsLock
[keyboard.layers.vim_navigation]
activation_key = "CapsLock"
mode = "Hold"

[keyboard.layers.vim_navigation.mappings]
# Basic directions
H = "Left"
J = "Down"
K = "Up"
L = "Right"

# Fast movement
W = "Ctrl+Right"      # Next word
B = "Ctrl+Left"       # Previous word
"0" = "Home"          # Beginning of line
"4" = "End"           # End of line (Shift+4 is $)
G = "Ctrl+End"        # End of document
U = "PageUp"
D = "PageDown"

# Text editing
X = "Delete"          # Delete character
I = "Home"            # Insert at beginning of line
A = "End"             # Append at end of line
O = "Ctrl+Enter"      # Insert new line below

# Selection (with Shift)
V = "Shift+Down"      # Start selection

# Another layer: numpad layer (activated with RightAlt)
[keyboard.layers.numpad]
activation_key = "RightAlt"
mode = "Hold"

[keyboard.layers.numpad.mappings]
# Map UIO/JKL/M,. to numpad
U = "Numpad7"
I = "Numpad8"
O = "Numpad9"
J = "Numpad4"
K = "Numpad5"
L = "Numpad6"
M = "Numpad1"
Comma = "Numpad2"
Period = "Numpad3"
