[package]
name = "wakem"
version = "0.0.1"
authors = ["wang-q <wang-q@outlook.com>"]
description = "`wakem` is a Window Adjust, Keyboard Enhance, Mouse enhance tool"
documentation = "https://github.com/wang-q/wakem"
homepage = "https://github.com/wang-q/wakem"
repository = "https://github.com/wang-q/wakem"
readme = "README.md"
categories = ["command-line-utilities", "science"]
license = "MIT"
edition = "2021"
publish = false

[[bin]]
name = "wakem"
path = "src/wakem.rs"

[dependencies]
clap = { version = "4.4.3", features = ["cargo"] }
anyhow = "1.0.75"
regex = "1.9.5"

[build-dependencies]

[dev-dependencies]
assert_cmd = "2.0.17"
predicates = "3.1.3"
mockito = "1.7.0"

[profile.release]
lto = true
